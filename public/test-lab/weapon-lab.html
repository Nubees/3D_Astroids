<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weapon Test Lab — LAB-NO2</title>
  <link rel="stylesheet" href="/src/test-lab/weapon-lab.css" />
</head>
<body>
  <canvas id="lab-canvas"></canvas>

  <!-- Ship selector overlay (Phase 1 of the lab: pick a ship like the main menu) -->
  <div id="ship-select-overlay" class="lab-overlay">
    <div class="lab-panel">
      <h1 class="lab-title">LAB-NO2 — WEAPON TESTBED</h1>
      <p class="lab-subtitle">Pick a ship, then launch the weapons arena.</p>
      <div id="ship-grid" class="lab-ship-grid"></div>
      <div class="lab-launch-row">
        <button id="launch-button" class="lab-launch-button" type="button" disabled>LAUNCH</button>
      </div>
      <p class="lab-hint">Click a ship, then LAUNCH (or press Enter).</p>
    </div>
  </div>

  <!-- Weapon HUD (Phase 2: in-arena ammo display) -->
  <div id="weapon-hud" class="lab-hud" hidden>
    <div class="lab-hud-title">ACTIVE WEAPONS</div>
    <div class="lab-hud-row">
      <div class="lab-hud-pill" data-kind="BOMB_STRIKE">
        <div class="lab-hud-pill-name">BOMB</div>
        <div class="lab-hud-pill-count">5</div>
        <div class="lab-hud-pill-bar"></div>
        <div class="lab-hud-pill-state">READY</div>
      </div>
      <div class="lab-hud-pill" data-kind="ORBIT_DRONES">
        <div class="lab-hud-pill-name">DRONES</div>
        <div class="lab-hud-pill-count">5</div>
        <div class="lab-hud-pill-bar"></div>
        <div class="lab-hud-pill-state">READY</div>
      </div>
      <div class="lab-hud-pill" data-kind="HOMING_MISSILES">
        <div class="lab-hud-pill-name">MISSILES</div>
        <div class="lab-hud-pill-count">5</div>
        <div class="lab-hud-pill-bar"></div>
        <div class="lab-hud-pill-state">READY</div>
      </div>
      <div class="lab-hud-pill" data-kind="MAGNET_BOOSTER">
        <div class="lab-hud-pill-name">MAGNET</div>
        <div class="lab-hud-pill-count">5</div>
        <div class="lab-hud-pill-bar"></div>
        <div class="lab-hud-pill-state">PENDING</div>
      </div>
    </div>
    <div class="lab-hud-hint">[1] BOMB · [2] DRONES · [3] MISSILES · [4] MAGNET</div>
  </div>

  <!-- Arena control buttons (Phase 2: respawn asteroids, reload ammo) -->
  <div id="arena-controls" class="lab-controls" hidden>
    <button id="respawn-asteroids-button" class="lab-control-button" type="button">Respawn Asteroids</button>
    <button id="reload-ammo-button" class="lab-control-button" type="button">Reload Ammo</button>
  </div>

  <script type="module" src="/src/test-lab/weapon-lab.ts"></script>
</body>
</html>
